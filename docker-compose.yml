services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tutorial
      POSTGRES_USER: tutorial
      POSTGRES_PASSWORD: tutorial
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tutorial -d tutorial"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    working_dir: /workspaces
    volumes:
      - .:/workspaces
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: tutorial
      POSTGRES_USER: tutorial
      POSTGRES_PASSWORD: tutorial
    ports:
      - "8000:8000"

volumes:
  postgres_data:
